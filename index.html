<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container pt-2">
        <h1 class="pb-3" >Bookmarker</h1>
        <hr>
        <div class="form-project text-center my-5 py-4" >
            <h2>Bookmark your favorite sites</h2>
            <div class="form-group mx-5 w-75" >
                <label class="text-center my-2" >Site Name</label>
                <input id="name" type="text" class="form-control" placeholder="Bookmark Name" > 
            </div>
            <div class="form-group mx-5 my-3 w-75" >
                <label class="text-center my-2" >Site Url</label>
                <input id="url" type="text" class="form-control" placeholder="Website URL" > 
            </div>
            <button id="addBtn" disabled class="btn btn-primary my-3" >Submit</button>
        </div>
        <input onkeyup="search(this.value)" class="my-3 form-control w-75 m-auto " placeholder="search by bookmark name"  >
        
        
        <div class="output" >
         <table class="table" >
          <thead>


          </thead>
          <tbody id="tableBody" >

          </tbody>
         </table>
        </div>
       <hr>
       <footer>
        <h6> 2019 BookmarkerInc. </h6>
       </footer>






    </div>
  






   <script src="js/bootstrap.bundle.js"></script>
   <script src="js/main.js"></script>
</body>
</html>
